# Dracula theme for Alacritty
# https://draculatheme.com/alacritty
#
# Color palette
# https://spec.draculatheme.com
#
# Template
# https://github.com/alacritty/alacritty/blob/master/alacritty.yml

colors:
  primary:
    foreground: '#93a1a1'
    background: '#141c21'
    bright_foreground: '#ffffff'
  cursor:
    text: CellBackground
    cursor: CellForeground
  vi_mode_cursor:
    text: CellBackground
    cursor: CellForeground
  search:
    matches:
      foreground: '#44475a'
      background: '#50fa7b'
    focused_match:
      foreground: '#44475a'
      background: '#ffb86c'
  hints:
    start:
      foreground: '#282a36'
      background: '#f1fa8c'
    end:
      foreground: '#f1fa8c'
      background: '#282a36'
  line_indicator:
    foreground: None
    background: None
  selection:
    text: CellForeground
    background: '#44475a'
  normal:
    black: '#263640'
    red: '#d12f2c'
    green: '#819400'
    yellow: '#b08500'
    blue: '#2587cc'
    magenta: '#696ebf'
    cyan: '#289c93'
    white: '#FFECE8'
  bright:
    black: '#4a697d'
    red: '#fa3935'
    green: '#a4bd00'
    yellow: '#d9a400'
    blue: '#2ca2f5'
    magenta: '#8086e8'
    cyan: '#33c5ba'
    white: '#fdf6e3'

font:
  normal:
    family: 0xProtoNerd font
    style: Regular

  size: 8.0

window:
  opacity: 0.8
